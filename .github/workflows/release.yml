name: Build and Release

on:
  push:
    branches: [ "main" ]

permissions:
  contents: write

jobs:
  build:
    runs-on: ubuntu-latest
    steps:
    - uses: actions/checkout@v4

    - name: Set up Go
      uses: actions/setup-go@v5
      with:
        go-version: '1.25.x'

    - name: Build
      run: |
        go build -v -o forge ./cmd/forge

    - name: Upload Artifact
      uses: actions/upload-artifact@v4
      with:
        name: forge-linux-amd64
        path: forge

    - name: Create Release
      uses: softprops/action-gh-release@v2
      with:
        tag_name: latest
        name: Latest Build
        body: "Latest build from main branch."
        draft: false
        prerelease: false
        files: forge
      env:
        GITHUB_TOKEN: ${{ secrets.GITHUB_TOKEN }}

    - name: Delete older releases
      uses: dev-drprasad/delete-older-releases@v0.3.3
      with:
        keep_latest: 5
        delete_tags: true
      env:
        GITHUB_TOKEN: ${{ secrets.GITHUB_TOKEN }}
    
    - name: Prune Old Artifacts
      uses: c-hive/gha-remove-artifacts@v1
      with:
        age: '0 seconds' # Matches immediately
        skip-recent: 5
      env:
        GITHUB_TOKEN: ${{ secrets.GITHUB_TOKEN }}
